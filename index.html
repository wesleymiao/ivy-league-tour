.plan-header { padding: 15px 20px 10px; border-bottom: 1px solid #1a2a4a; flex-shrink: 0; }
.plan-title { font-size: 20px; font-weight: bold; }

.plan-desc { font-size: 12px; color: #8899bb; margin-top: 4px; line-height: 1.4; }

/* Itinerary scroll */

.day-card { display: flex; margin-bottom: 10px; }
.day-num { width: 42px; flex-shrink: 0; }
.day-num .circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: #fff; }
.day-info { flex: 1; padding-left: 10px; border-left: 2px solid #2a3a5a; padding-bottom: 8px; }
.day-info .title { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
.day-info .desc { font-size: 11px; color: #8899bb; line-height: 1.4; }
.day-info .transport { font-size: 10px; color: #5a7a9a; margin-top: 2px; }

/* Stats */
.stats-bar { display: flex; justify-content: space-around; padding: 12px 10px; border-top: 1px solid #2a3a5a; flex-shrink: 0; }
.stat { text-align: center; }
.stat .num { font-size: 20px; font-weight: bold; color: #f0c040; }
.stat .label { font-size: 10px; color: #8899bb; }
.stat .saving { font-size: 10px; color: #2ecc71; }

.cost-table { width: 100%; border-collapse: collapse; }

let currentPlan = 0;
let mapLayers = [];

const map = L.map('map', { center: [41.5, -73.2], zoom: 7, zoomControl: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

function getPos(key) {
  if (key === 'boston') return boston;
  return allSchools[key];
}

function renderPlan(idx) {
  currentPlan = idx;
  const plan = plans[idx];

  // Update tabs
  document.querySelectorAll('.plan-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  // Header
  document.getElementById('planHeader').innerHTML = `
    <div class="plan-title">${plan.title}</div>
    <div class="plan-desc">${plan.desc}</div>
  `;

  // Flight info
  const flyInApt = airports[plan.flyIn];
  const flyOutApt = airports[plan.flyOut];
  document.getElementById('flightInfo').innerHTML = `
    <div class="flight-box">
      <div class="fl-label">✈️ 飞入</div>
      <div class="fl-city">${flyInApt.cn}</div>
      <div class="fl-airport">${plan.flyIn} · ${flyInApt.name}</div>
    </div>
    <div class="flight-box">
      <div class="fl-label">🛫 飞出</div>
      <div class="fl-city">${flyOutApt.cn}</div>
      <div class="fl-airport">${plan.flyOut} · ${flyOutApt.name}</div>
    </div>
  `;

  // Itinerary
  document.getElementById('itinerary').innerHTML = plan.days.map(d => `
    <div class="day-card">
      <div class="day-num"><div class="circle" style="background:${d.color};">${d.day}</div></div>
      <div class="day-info">
        <div class="title">${d.title}</div>
        <div class="desc">${d.desc}</div>
        <div class="transport">${d.transport}</div>
      </div>
    </div>
  `).join('');

  // Stats
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${plan.numSchools}</div><div class="label">藤校</div></div>
    <div class="stat"><div class="num">${plan.numDays}</div><div class="label">天</div></div>
    <div class="stat"><div class="num">~${plan.totalKm.toLocaleString()}</div><div class="label">公里</div></div>
    <div class="stat"><div class="num">${plan.totalCost}</div><div class="label">总费用(2人)</div></div>
  `;

  // Cost breakdown
  document.getElementById('costSection').innerHTML = `
    <div class="cost-title">💰 费用明细（1大1小）</div>
    <table class="cost-table">
      ${plan.costs.map(c => `
        <tr>
          <td>${c.item}</td>
          <td>${c.amount}</td>
          <td>${c.note}</td>
        </tr>
      `).join('')}
      <tr class="cost-total">
        <td>合计</td>
        <td>${plan.totalCost}</td>
        <td></td>
      </tr>
    </table>
    <div class="cost-note">* 价格为暑假旺季估算，实际因预订时间和选择而异</div>
  `;

  // Compare note
  const note = document.getElementById('compareNote');
  if (plan.saving) {
    note.style.display = 'block';
    note.innerHTML = `✅ 相比全部8校方案：${plan.saving}`;
  } else {
    note.style.display = 'none';
  }

  // Flight recommendations
  const fr = plan.flightRecs;
  if (fr) {
    document.getElementById('flightRec').innerHTML = `
      <div class="flight-rec">
        <div class="flight-rec-title">✈️ 航班推荐</div>
        <div class="flight-leg">
          <div class="flight-leg-header">
            <span class="flight-leg-dir">🛬 ${fr.outbound.label}</span>
            <span class="flight-leg-dur">${fr.outbound.dur}</span>
          </div>
          ${fr.outbound.options.map(o => `
            <div class="flight-option">
              ${o.rec ? '<span class="fo-rec">推荐</span>' : ''}
              <span class="fo-airline">${o.airline}</span>
              <span class="fo-route">${o.route}</span>
              <span class="fo-price">${o.price}</span>
            </div>
          `).join('')}
        </div>
        <div class="flight-leg return">
          <div class="flight-leg-header">
            <span class="flight-leg-dir">🛫 ${fr.inbound.label}</span>
            <span class="flight-leg-dur">${fr.inbound.dur}</span>
          </div>
          ${fr.inbound.options.map(o => `
            <div class="flight-option">
              ${o.rec ? '<span class="fo-rec">推荐</span>' : ''}
              <span class="fo-airline">${o.airline}</span>
              <span class="fo-route">${o.route}</span>
              <span class="fo-price">${o.price}</span>
            </div>
          `).join('')}
        </div>
        <div class="flight-tip">${fr.tip}</div>
      </div>
    `;
  }

  // Update map
  mapLayers.forEach(l => map.removeLayer(l));
  mapLayers = [];

  const activeSet = new Set(plan.schools);

  // Draw real driving routes via OSRM
  async function drawRoutes() {
    for (const r of plan.route) {
      const from = getPos(r.from);
      const to = getPos(r.to);

      try {
        const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.routes && data.routes[0]) {
          const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
          const realDist = Math.round(data.routes[0].distance / 1000);
          const realDur = Math.round(data.routes[0].duration / 3600 * 10) / 10;

          const line = L.polyline(coords, {
            color: '#e74c3c', weight: 4, opacity: 0.75,
          }).addTo(map);
          mapLayers.push(line);

          // Distance label at midpoint of route
          const midIdx = Math.floor(coords.length / 2);
          const midPt = coords[midIdx];
          const distMarker = L.marker(midPt, {
            icon: L.divIcon({
              className: 'dist-label',
              html: `<div class="dist-text">${realDist}km · ${realDur}h</div>`,
              iconSize: [90, 20], iconAnchor: [45, 10],
            }), interactive: false,
          }).addTo(map);
          mapLayers.push(distMarker);
        }
      } catch (e) {
        // Fallback to straight line
        const line = L.polyline([[from.lat, from.lng], [to.lat, to.lng]], {
          color: '#e74c3c', weight: 3.5, opacity: 0.8, dashArray: '8, 5',
        }).addTo(map);
        mapLayers.push(line);

        if (r.km > 10) {
          const midLat = (from.lat + to.lat) / 2;
          const midLng = (from.lng + to.lng) / 2;
          const distMarker = L.marker([midLat, midLng], {
            icon: L.divIcon({
              className: 'dist-label',
              html: `<div class="dist-text">~${r.km}km</div>`,
              iconSize: [60, 20], iconAnchor: [30, 10],
            }), interactive: false,
          }).addTo(map);
          mapLayers.push(distMarker);
        }
      }
    }
  }
  drawRoutes();

  // Boston marker
  const bm = L.marker([boston.lat, boston.lng], {
    icon: L.divIcon({
      className: 'start-marker',
      html: `<div class="start-inner"><div class="start-dot"></div><div class="start-label">✈️ Boston 起点</div></div>`,
      iconSize: [100, 40], iconAnchor: [50, 8],
    }),
  }).addTo(map);
  mapLayers.push(bm);

  // Airport markers
  [plan.flyIn, plan.flyOut].forEach((code, i) => {
    const apt = airports[code];
    const label = i === 0 ? '飞入' : '飞出';
    const am = L.marker([apt.lat, apt.lng], {
      icon: L.divIcon({
        className: 'airport-marker',
        html: `<div class="airport-inner"><div class="airport-icon">${i === 0 ? '🛬' : '🛫'}</div><div class="airport-label">${code}</div><div class="airport-type">${label}</div></div>`,
        iconSize: [60, 50], iconAnchor: [30, 10],
      }),
    }).addTo(map);
    mapLayers.push(am);
  });

  // School markers
  let dayIdx = 0;
  const dayMap = {};
  plan.days.forEach(d => { /* build day assignment from route */ });
  // Assign days to schools based on plan.days order
  const schoolDayColors = {};
  plan.schools.forEach((s, i) => {
    const d = plan.days[Math.min(i, plan.days.length - 1)];
    schoolDayColors[s] = { day: d.day, color: d.color };
  });
  // Special handling for plans where two schools share a day
  if (plan.id === 'full') {
    schoolDayColors.princeton = { day: 'D6', color: '#9b59b6' };
    schoolDayColors.upenn = { day: 'D6', color: '#9b59b6' };
    schoolDayColors.cornell = { day: 'D7', color: '#e91e63' };
  } else if (plan.id === 'no-cornell') {
    schoolDayColors.princeton = { day: 'D6', color: '#9b59b6' };
    schoolDayColors.upenn = { day: 'D6', color: '#9b59b6' };
  } else if (plan.id === 'compact') {
    schoolDayColors.princeton = { day: 'D5', color: '#9b59b6' };
    schoolDayColors.upenn = { day: 'D5', color: '#9b59b6' };
  }

  Object.entries(allSchools).forEach(([key, s]) => {
    const active = activeSet.has(key);
    const dc = schoolDayColors[key] || { day: '', color: s.color };
    const icon = L.divIcon({
      className: 'school-marker',
      html: `
        <div class="marker-inner">
          ${active ? `<div class="marker-day">${dc.day}</div>` : ''}
          <div class="marker-dot ${active ? '' : 'inactive'}" style="background:${active ? dc.color : '#666'};"></div>
          <div class="marker-label ${active ? '' : 'inactive'}">${s.name} ${s.cn}</div>
        </div>
      `,
      iconSize: [120, 50], iconAnchor: [60, 12],
    });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
    mapLayers.push(m);
  });

  // Fit bounds to active route + airports
  const pts = [boston, ...plan.schools.map(k => allSchools[k]), airports[plan.flyIn], airports[plan.flyOut]];
  map.fitBounds(L.latLngBounds(pts.map(p => [p.lat, p.lng])).pad(0.12));
}

// Build tabs
const tabsEl = document.getElementById('tabs');
plans.forEach((p, i) => {
  const tab = document.createElement('div');
  tab.className = 'plan-tab' + (i === 0 ? ' active' : '');
  tab.innerHTML = `${p.label}<span class="tab-label">${p.sublabel}</span>`;
  tab.onclick = () => renderPlan(i);
  tabsEl.appendChild(tab);
});

// Initial render
renderPlan(0);
</script>
